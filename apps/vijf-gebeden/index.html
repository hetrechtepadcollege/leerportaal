    <title>De Vijf Gebeden | Het Rechte Pad College</title>
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://leer.hetrechtepadcollege.nl/apps/vijf-gebeden/">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="De Vijf Gebeden — Alles over de dagelijkse gebeden">

    <meta property="twitter:image" content="https://leer.hetrechtepadcollege.nl/images/share-banner.png">

<body>
<div class="app-shell">
    <header class="app-header">
        <div class="header-inner">
            <img src="../../images/HRPC-logo.png" alt="Het Rechte Pad College" class="header-logo">
            <div class="header-text">
                <h1>De Vijf Gebeden</h1>
                <p class="header-subtitle">Leer alles over de dagelijkse salah</p>
            </div>
        </div>
        <div class="portal-home-wrap">
            <a href="../../" class="portal-home-btn">← Terug naar Leerportaal</a>
        </div>
    </header>
    <main class="app-main">
        <div class="gebed-selector" id="gebedSelector" role="tablist"></div>
        <div class="card gebed-detail" id="gebedDetail"></div>
        <section class="quiz-sectie">
            <h2 class="quiz-titel">🎯 Test je kennis</h2>
            <div class="card quiz-kaart" id="quizKaart">
                <p class="quiz-vraag" id="quizVraag"></p>
                <div class="quiz-opties" id="quizOpties"></div>
                <p class="quiz-feedback" id="quizFeedback"></p>
                <button class="btn-primary hidden" id="quizVolgende" onclick="volgendeQuizVraag()">Volgende →</button>
            </div>
        </section>
    </main>

    <div class="portal-home-wrap">
        <a href="../../" class="portal-home-btn">← Terug naar Leerportaal</a>
    </div>

    <footer class="app-footer">
        <p>© 2026 Het Rechte Pad College</p>
        <a href="https://www.hetrechtepad.nl" target="_blank" rel="noopener noreferrer" class="footer-link">www.hetrechtepad.nl</a>
    </footer>
</div>
<script src="script.js"></script>
<script data-goatcounter="https://hetrechtepadcollege.goatcounter.com/count"
