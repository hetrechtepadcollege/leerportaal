<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kennisquiz Gebed</title>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://gc.zgo.at https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://hetrechtepadcollege.goatcounter.com;">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans:wght@400;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <meta property="og:type" content="article">
    <meta property="og:url" content="https://leer.hetrechtepadcollege.nl/apps/gebed-quiz/">
    <meta property="og:title" content="Kennisquiz Gebed">
    <meta property="og:description" content="Test je kennis over het gebed: tijden, reinheid, uitvoering en wat het gebed ongeldig maakt. Doe nu mee!">
    <meta property="og:image" content="https://leer.hetrechtepadcollege.nl/apps/gebed-quiz/images/share-banner.png">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Kennisquiz Gebed">
    <meta property="twitter:description" content="Test je kennis over het gebed. Doe nu mee!">
    <meta property="twitter:image" content="https://leer.hetrechtepadcollege.nl/apps/gebed-quiz/images/share-banner.png">
</head>
<body>

<div class="page-wrapper">

    <header class="site-header">
        <img src="images/HRPC-logo.png" alt="Logo Het Rechte Pad College" class="site-logo">
    </header>

    <main class="quiz-card">

        <div class="quiz-title-block">
            <h1>Kennisquiz Gebed</h1>
            <p class="quiz-subtitle">Test je kennis over het gebed</p>
        </div>

        <!-- Modusskeuze (zichtbaar bij start) -->
        <div id="mode-selector" class="mode-selector-screen">
            <p class="mode-intro">Kies je oefenmodus</p>
            <div class="mode-buttons">
                <button id="mode-vragen-btn" class="btn-mode">
                    <span class="mode-icon">📚</span>
                    <span class="mode-title">Vragen</span>
                    <span class="mode-desc">28 kennisvragen over gebedstijden, reinheid en uitvoering</span>
                </button>
                <button id="mode-situaties-btn" class="btn-mode">
                    <span class="mode-icon">📋</span>
                    <span class="mode-title">Situaties</span>
                    <span class="mode-desc">20 praktijksituaties — beoordeel of het gebed correct is uitgevoerd</span>
                </button>
            </div>
        </div>

        <!-- Quizinhoud (verborgen tot modus gekozen) -->
        <div id="quiz-content" class="hide">

            <div class="character-container">
                <img id="character-img" src="images/mw-neutral.png" alt="Karakter" class="character animate-character">
            </div>

            <div class="question-meta">
                <span id="category-badge" class="category-badge"></span>
            </div>

            <div id="scenario-block" class="scenario-block hide">
                <div class="scenario-header">
                    <span class="scenario-icon">📋</span>
                    <span class="scenario-label">Situatie</span>
                </div>
                <p id="scenario-tekst"></p>
            </div>

            <h2 id="question-text">De vraag komt hier...</h2>

            <div id="answer-buttons"></div>

            <div id="uitleg-container" class="hide uitleg-box">
                <div class="uitleg-header">
                    <span class="uitleg-icon">📖</span>
                    <span class="uitleg-label">Toelichting</span>
                </div>
                <p id="uitleg-tekst"></p>
                <button id="next-btn" class="btn btn-next">Volgende vraag →</button>
            </div>

            <div id="score-display" class="score-display">Score: 0</div>

            <div class="progress-section">
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="mode-back-wrap" class="mode-back-wrap">
                <button id="mode-terug-quiz-btn" class="btn btn-secondary mode-terug-btn">← Terug naar begin</button>
            </div>

            <div id="result-container" class="hide result-box">
                <button id="whatsapp-share-btn" class="btn btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> Deel via WhatsApp
                </button>
                <button id="restart-btn" class="btn btn-secondary">Opnieuw spelen</button>
                <button id="mode-keuze-btn" class="btn btn-secondary">Andere modus kiezen</button>
                <a href="../../" id="portal-link-btn" class="btn btn-secondary">Naar het Leerportaal</a>
            </div>

        </div><!-- /#quiz-content -->

    </main>

    <div class="portal-home-wrap">
        <a href="https://leer.hetrechtepadcollege.nl/" class="portal-home-btn">← Terug naar Leerportaal</a>
    </div>

</div>

<audio id="correct-sound" src="sounds/correct.mp3" preload="auto"></audio>
<audio id="wrong-sound" src="sounds/wrong.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

<!-- SRI hash must be updated if GoatCounter updates count.js -->
<script data-goatcounter="https://hetrechtepadcollege.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"
        integrity="sha384-2UjvVpptg4JlEVgJI2PdscrjOjPcil/4F1ZvIMJ81CShQnEDSlPI+l4PfogvTLYi"
        crossorigin="anonymous"></script>
</body>
</html>
